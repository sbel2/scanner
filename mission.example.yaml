# ============================================================
#  SCANNER — MISSION FILE
#  This is the single source of truth for your scanner.
#  Fill this out once, then run:  python -m scanner run
# ============================================================

# ----------------------------------------------------------
# WHO YOU ARE
# ----------------------------------------------------------
profile:
  # Your name (used in eligibility checks and email greetings)
  name: "Your Name"

  # Your role — e.g. "PhD student", "indie hacker", "startup founder", "researcher"
  role: "Your Role"

  # Your primary city/region — used to weight geographic scoring
  # Examples: "San Francisco, CA" | "Boston, MA" | "London, UK" | "Remote"
  location: "Your City, State"

  # A short paragraph about who you are and what you are building.
  # This is injected directly into the LLM scoring prompt, so be specific.
  # The more context you give, the better the scoring.
  background: |
    Write 2–4 sentences about your background, current work, and goals.
    Example: "I am a 2nd-year PhD student at MIT studying machine learning.
    I am building an open-source tool for AI-assisted code review and looking
    for hackathons, credits, and research internships to accelerate my work."

# ----------------------------------------------------------
# WHAT YOU ARE WORKING ON  (alignment context)
# These are read by the LLM scorer to judge relevance.
# Add as many sections as you like. Each entry has a title and content.
# ----------------------------------------------------------
alignment:
  - title: "Core Mission"
    content: |
      Describe your overarching goal in 1–3 sentences.
      Example: "Build the best AI agent framework for personal productivity."

  - title: "Current Project"
    content: |
      Describe your main project — what it does, who it is for, what stage it is at.

  # Add more sections as needed:
  # - title: "Research Interest"
  #   content: |
  #     Describe a research area you are actively pursuing.

# ----------------------------------------------------------
# OPPORTUNITY PREFERENCES
# ----------------------------------------------------------
preferences:
  # Geographic priorities — list in order from most to least preferred.
  # The scorer will use this to weight in-person vs. remote opportunities.
  locations:
    - "Your City"          # highest priority — in-person here is best
    # - "New York City"    # second priority
    # - "San Francisco"    # worth a flight for big opportunities
    # - "Remote"           # acceptable for high-value opportunities

  # Which opportunity categories to scan for.
  # Options: event | funding | research | internship
  categories:
    - event
    - funding
    - research
    - internship

  # search_strategy — a natural-language directive the scanner uses every
  # morning to generate a FRESH, exploratory batch of web-search queries.
  # This replaces the old rigid `search_queries:` list. Instead of repeating
  # the same fixed terms each day, the agent reads today's date + your mission
  # below and reasons up a diverse set of queries, so signals stay varied and
  # you discover things a static list would never surface.
  #
  # Write it like you're briefing a sharp research assistant: state your
  # priorities in order, name the kinds of places real opportunities live, and
  # the phrasings to avoid. Keep it freeform — the agent decides exact wording
  # and angles each run.
  #
  # (Backward-compatible: if you'd rather pin an exact list, delete this block
  # and add a `search_queries:` list of strings instead — the scanner falls
  # back to it when `search_strategy` is absent.)
  search_strategy: |
    Every morning, generate ~20 diverse web-search queries that surface
    SPECIFIC, NAMED, NEAR-TERM opportunities for me. Reason fresh — don't just
    repeat boilerplate or yesterday's terms with the date swapped.

    Priorities (in order):
      1. [Your #1 — e.g. in-person AI events I can attend in my city in the
         next 2–4 weeks: hackathons with prizes, pitch nights, demo days,
         talks, builder meetups]. This is the bulk of the queries.
      2. [Your #2 — e.g. high-value events elsewhere worth traveling for].
      3. [Your #3 — e.g. fellowships / accelerators / cohorts I can apply to].
      4. [Your #4 — e.g. internships or roles that fit my stage].
      5. [Your #5 — e.g. funding / grants relevant to my work].

    How to phrase queries — make them work for me:
      - Hit real event surfaces directly: name sites like lu.ma, partiful,
        eventbrite, devpost, and specific org/university domains where actual
        event pages live.
      - Use concrete local anchors (neighborhoods, venues, labs, universities,
        community chapters) so results are near me.
      - Vary the time-window phrasing: "this week", "this weekend",
        "{month} {year}", "next 14 days", "upcoming".
      - AVOID phrasings that pull in aggregator/listicle/category pages — don't
        write "discover events", "top 25 internships", "best hackathons 2026",
        "list of...". Those just dump landing pages on you.
      - At least 3 queries should explore angles I did NOT explicitly name but
        that fit my mission (adjacent labs, niche communities, VC-hosted nights,
        incubator office hours, university-affiliated demo events).

    Surprise me. Make the queries genuinely different each day.

  # Lu.ma calendar IDs to subscribe to (optional).
  # To find a cal-XXX ID: open the lu.ma calendar page, view source, search "cal-"
  # Example: "cal-EnsrRAJPfkZzBsv"
  luma_calendar_ids: []

  # Generic ICS calendar feeds (optional).
  # Each entry needs a name, url, and optional default location.
  ical_feeds: []
  # Example:
  # ical_feeds:
  #   - name: "mit-csail"
  #     url: "https://calendar.mit.edu/department/comp_sci_artificial_intelligence_lab/calendar.ics"
  #     location: "Cambridge, MA"

  # Specific websites or organizations to watch each run (optional).
  # Use this for pages that keyword search and calendar feeds miss — a
  # conference landing page, a lab/org events page, a community group, an
  # accelerator's program page. Each run fetches the page and extracts any
  # concrete opportunities from it. List the exact URLs.
  watch_urls: []
  # Example:
  # watch_urls:
  #   - "https://example-conference.ai/2026/"     # a conference you care about
  #   - "https://some-ai-lab.org/events"          # an org/lab's events page
  #   - "https://your-city.aitinkerers.org/"      # a local community group

# ----------------------------------------------------------
# ELIGIBILITY  (optional)
# ----------------------------------------------------------
# Scanner decides eligibility with a profile-aware LLM check, so it already
# understands who you are from the `profile` section above — you usually don't
# need anything here.
#
# `rules` are natural language rejection criteria for the LLM.
# Claude will generate these dynamically based on your mission.
#
# `hard_reject_patterns` is an OPTIONAL fast path: any opportunity whose text
# matches one of these (case-insensitive) regexes is rejected immediately.
eligibility:
  rules:
    - "Reject if the opportunity is explicitly for undergraduates only."
    - "Reject if the candidate must be a US citizen and they are not."
  hard_reject_patterns:
    - "undergrad(uate)? (only|students only)"
    - "high\\s*school (students? )?only"

# ----------------------------------------------------------
# SCORING WEIGHTS  (optional — defaults shown)
# These control how the final score is computed.
# final_score = alignment_score * alignment_weight + urgency_score * urgency_weight
# ----------------------------------------------------------
scoring:
  alignment_weight: 0.7
  urgency_weight: 0.3
  min_score_to_send: 4.0   # items below this score are dropped from the digest

# ----------------------------------------------------------
# EMAIL SETTINGS
# ----------------------------------------------------------
email:
  # Where to send the daily digest — MUST be a real inbox you check.
  # (Leave as-is and setup will prompt you; the first digest is sent here.)
  to: "you@example.com"
  # Sender address — use "onboarding@resend.dev" to skip domain verification on Resend
  from: "onboarding@resend.dev"

# ----------------------------------------------------------
# RUNTIME SETTINGS
# ----------------------------------------------------------
settings:
  # Number of top opportunities to include in each digest
  top_n: 8
  # LLM models (change only if you know what you are doing).
  # Defaults balance quality vs. speed/cost: a cheap, fast model for the
  # yes/no eligibility gate and a stronger model for nuanced scoring.
  # Using a top-tier model for the filter is slow and can hit rate limits
  # on a Pro/Max subscription when many items are collected.
  model_score: "claude-sonnet-4-6"
  model_filter: "claude-haiku-4-5-20251001"
